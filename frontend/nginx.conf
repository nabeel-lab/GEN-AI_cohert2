server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service — matches the Vite dev proxy
    # behavior in vite.config.js so the same /api/* paths work in production.
    # BACKEND_URL is replaced at container startup by entrypoint.sh when
    # deploying to Cloud Run. Falls back to docker-compose hostname.
    location /api/ {
        proxy_pass BACKEND_URL/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
