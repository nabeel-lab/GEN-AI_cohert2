server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for any non-file route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service — matches the Vite dev proxy
    # behavior in vite.config.js so the same /api/* paths work in production.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
